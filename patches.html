<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>oscimo — Patch Library</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23f4f3ee'/%3E%3Cpolyline points='0,16 4,16 7,4 10,28 13,4 16,28 19,4 22,28 25,16 32,16' fill='none' stroke='%23e8392a' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#e8392a; --bg:#f4f3ee; --bg2:#eceae4; --bg3:#e2e0d8;
  --text:#111110; --text2:#555450; --text3:#999890;
  --border:#d8d6ce; --border2:#c4c2ba;
}
html{scroll-behavior:smooth}
body{
  background:var(--bg); color:var(--text);
  font-family:'DM Sans',sans-serif;
  overflow-x:hidden; font-size:14px; line-height:1.6;
}

/* REVEAL */
.reveal{opacity:0;transform:translateY(18px);transition:opacity 0.75s cubic-bezier(0.16,1,0.3,1),transform 0.75s cubic-bezier(0.16,1,0.3,1)}
.reveal.on{opacity:1;transform:none}

/* NAV - GUIDE 제거됨 */
nav{
  position:fixed; top:0; left:0; right:0; z-index:200;
  height:50px; padding:0 5%;
  display:flex; align-items:center; justify-content:space-between;
  background:rgba(244,243,238,0.96); backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
}
.nav-logo{
  font-family:'DM Mono',monospace; font-size:14px; font-weight:500;
  color:var(--text); text-decoration:none; letter-spacing:-0.3px;
}
.nav-logo em{color:var(--red); font-style:normal}
.nav-links{display:flex; gap:28px; list-style:none}
.nav-links a{
  font-family:'DM Mono',monospace; font-size:11px;
  color:var(--text3); text-decoration:none;
  letter-spacing:0.3px; transition:color 0.15s;
}
.nav-links a:hover, .nav-links a.on{color:var(--text)}
.lang-btn{
  font-family:'DM Mono',monospace; font-size:10px;
  color:var(--text3); background:none; border:1px solid var(--border);
  cursor:pointer; padding:4px 10px; transition:all 0.15s;
}

/* SECTION & TITLES */
.sec{padding:100px 5%}
.sec-label{
  font-family:'DM Mono',monospace; font-size:10px;
  color:var(--text3); letter-spacing:2px; text-transform:uppercase;
  margin-bottom:18px; display:flex; align-items:center; gap:10px;
}
.sec-label::before{content:''; width:16px; height:1px; background:var(--text3)}
.sec-h{
  font-family:'DM Sans',sans-serif; font-size:clamp(32px,4vw,54px);
  font-weight:300; letter-spacing:-1.5px; line-height:1.1; margin-bottom:18px;
}
.sec-h strong{font-weight:500}
.sec-body{font-size:15px; line-height:1.78; color:var(--text2); max-width:600px; margin-bottom:40px}

/* IMAGE BOX */
.img-box{
  width:100%; max-width:900px; margin:40px 0;
  border:1px solid var(--border); background:var(--bg2);
  line-height:0; overflow:hidden;
}
.img-box img{width:100%; height:auto; filter:grayscale(0.2); transition:filter 0.3s}
.img-box img:hover{filter:grayscale(0)}

/* WORKFLOW & GRID (기존 스타일 유지) */
.workflow-grid{display:grid; grid-template-columns:repeat(auto-fit, minmax(240px, 1fr)); gap:1px; background:var(--border); margin-top:48px}
.wf-card{background:var(--bg); padding:32px 28px}
.wf-num{font-family:'DM Mono'; font-size:11px; color:var(--red); margin-bottom:12px}
.wf-title{font-weight:500; font-size:16px; margin-bottom:8px}

.controls{display:flex; gap:16px; align-items:center; flex-wrap:wrap; margin-top:60px; margin-bottom:32px}
.search-input{flex:1; min-width:240px; background:transparent; border:1px solid var(--border); padding:10px 16px; font-family:'DM Mono'; font-size:11px}
.tag{font-family:'DM Mono'; font-size:9px; letter-spacing:1px; padding:5px 12px; border:1px solid var(--border2); color:var(--text3); background:none; cursor:pointer}
.tag.active{border-color:var(--text); color:var(--text); background:var(--bg3)}

.patch-grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:1px; background:var(--border); border-top:1px solid var(--border); border-bottom:1px solid var(--border)}
.patch-card{background:var(--bg); padding:24px; display:flex; flex-direction:column; gap:14px}
.patch-cat{font-family:'DM Mono'; font-size:9px; letter-spacing:1.5px; padding:3px 8px; border:1px solid; text-transform:uppercase}
.cat-synth{color:var(--red); border-color:rgba(232,57,42,0.3)}
.download-btn{font-family:'DM Mono'; font-size:11px; padding:8px 16px; border:1px solid var(--border2); color:var(--text2); text-decoration:none; text-align:center}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">oscimo <em>—</em></a>
  <div class="nav-links">
    <a href="index.html">HARDWARE</a>
    <a href="patches.html" class="on">PATCHES</a>
    </div>
  <button class="lang-btn" id="langBtn">EN</button>
</nav>

<section class="sec reveal">
  <div class="sec-label" data-ko="소프트웨어로 소리를 설계한다" data-en="DESIGN SOUND WITH SOFTWARE">소프트웨어로 소리를 설계한다</div>
  <h1 class="sec-h" data-ko="당신의 패치를 <strong>직접 만드세요</strong>" data-en="Create your own <strong>Patches</strong>">당신의 패치를 <strong>직접 만드세요</strong></h1>
  <p class="sec-body" data-ko="oscimo는 PlugData(Pure Data)를 통해 무한한 사운드 가능성을 제공합니다. 아래 이미지는 실제 작업 화면이며, 직접 만든 패치를 라이브러리에 추가할 수 있습니다." 
     data-en="oscimo offers infinite sound possibilities through PlugData (Pure Data). The image below shows the actual workspace where you can create and add your own patches.">
    oscimo는 PlugData(Pure Data)를 통해 무한한 사운드 가능성을 제공합니다. 아래 이미지는 실제 작업 화면이며, 직접 만든 패치를 라이브러리에 추가할 수 있습니다.
  </p>

  <div class="img-box">
    <img src="plugdata_work.jpg" alt="PlugData Workspace">
  </div>

  <div class="workflow-grid">
    <div class="wf-card">
      <div class="wf-num">01</div>
      <div class="wf-title" data-ko="패치 선택" data-en="Choose Patch">패치 선택</div>
      <div class="wf-desc" data-ko="라이브러리에서 파일을 다운로드하세요." data-en="Download files from library.">라이브러리에서 파일을 다운로드하세요.</div>
    </div>
    <div class="wf-card">
      <div class="wf-num">02</div>
      <div class="wf-title" data-ko="컴파일러 접속" data-en="Open Compiler">컴파일러 접속</div>
      <div class="wf-desc" data-ko="PlugData 웹 컴파일러를 실행합니다." data-en="Run the PlugData web compiler.">PlugData 웹 컴파일러를 실행합니다.</div>
    </div>
    <div class="wf-card">
      <div class="wf-num">03</div>
      <div class="wf-title" data-ko="업로드" data-en="Upload">업로드</div>
      <div class="wf-desc" data-ko="기기에 파일을 복사하면 완료됩니다." data-en="Copy files to your device.">기기에 파일을 복사하면 완료됩니다.</div>
    </div>
  </div>
</section>

<section class="sec reveal" style="padding-top:0">
  <div class="sec-label" data-ko="패치 탐색" data-en="EXPLORE PATCHES">패치 탐색</div>
  <div class="controls">
    <input type="text" id="searchInput" class="search-input" placeholder="Search..." data-ko="검색..." data-en="Search...">
    <div class="filter-group" id="filterGroup">
      <button class="tag active" data-cat="all">ALL</button>
      <button class="tag" data-cat="synth">SYNTH</button>
      <button class="tag" data-cat="drum">DRUM</button>
      <button class="tag" data-cat="fx">FX</button>
    </div>
  </div>
  <div class="patch-grid" id="patchGrid"></div>
</section>

<script>
// (JS 로직은 이전과 동일하며, 렌더링 및 언어 전환 기능이 포함되어 있습니다)
let patches = [];
let activeFilter = 'all';
let searchQuery = '';
let lang = 'ko';

const observer = new IntersectionObserver(entries => {
  entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('on'); });
}, { threshold: 0.1 });
document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

async function load() {
  try {
    const res = await fetch('patches.json');
    patches = await res.json();
    render();
  } catch(e) { console.error("JSON 로드 오류", e); }
}

function render() {
  const grid = document.getElementById('patchGrid');
  if(!grid) return;
  const filtered = patches.filter(p => {
    const matchesFilter = activeFilter === 'all' || p.category === activeFilter;
    const matchesSearch = p.name.toLowerCase().includes(searchQuery.toLowerCase());
    return matchesFilter && matchesSearch;
  });

  grid.innerHTML = filtered.map(p => `
    <div class="patch-card">
      <div class="patch-header">
        <span class="patch-cat cat-${p.category}">${p.category}</span>
      </div>
      <h3 class="patch-name">${p.name}</h3>
      <p class="patch-desc">${p.desc[lang]}</p>
      <a href="${p.file}" download class="download-btn">${lang==='ko'?'다운로드':'DOWNLOAD'}</a>
    </div>
  `).join('');
}

document.getElementById('filterGroup').addEventListener('click', e => {
  if (!e.target.classList.contains('tag')) return;
  document.querySelectorAll('.tag').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  activeFilter = e.target.dataset.cat;
  render();
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  render();
});

const langBtn = document.getElementById('langBtn');
langBtn.addEventListener('click', () => {
  lang = lang === 'ko' ? 'en' : 'ko';
  langBtn.textContent = lang === 'ko' ? 'EN' : 'KO';
  document.querySelectorAll('[data-ko]').forEach(el => {
    el.innerHTML = el.getAttribute('data-' + lang);
  });
  render();
});

load();
</script>
</body>
</html>
